name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Use Node.js
      uses: actions/setup-node@v7
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v7
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v7
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci

    - name: Compile
      run: npm run compile
    
    - name: Run tests (Ubuntu with virtual display)
      run: xvfb-run -a npm test
      if: matrix.os == 'ubuntu-latest'
    
    - name: Run tests (Windows/macOS)
      run: npm test
      if: matrix.os != 'ubuntu-latest'

  # Single stable status context for branch-protection gating: the test matrix
  # produces brittle per-leg contexts, so the main ruleset requires this instead.
  # Runs on PRs (always()) and reports success only if lint and test both passed,
  # so Dependabot auto-merge lands only on green CI.
  gate:
    if: always()
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
    - name: Require lint and test to have passed
      run: |
        [ "${{ needs.lint.result }}" = "success" ] && [ "${{ needs.test.result }}" = "success" ]

  package:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v7
    
    - name: Use Node.js
      uses: actions/setup-node@v7
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install vsce
      run: npm install -g @vscode/vsce
    
    - name: Package extension
      run: vsce package
    
    - name: Upload VSIX
      uses: actions/upload-artifact@v4
      with:
        name: generic-lsp-proxy-vsix
        path: '*.vsix'