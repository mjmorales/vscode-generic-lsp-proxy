name: Dependabot auto-merge
on: pull_request

permissions:
  contents: write
  pull-requests: write

# Variant for repos whose main keeps a required PR review: the Actions token
# approves the Dependabot PR (satisfying the review) before enabling auto-merge.
# Requires the repo setting "Allow GitHub Actions to create and approve pull
# requests" (can_approve_pull_request_reviews). Merge gating is the required
# status checks in the main ruleset.
jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Approve
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable auto-merge
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
