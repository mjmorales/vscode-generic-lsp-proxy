version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # @types/node must track the minimum supported Node runtime (CI targets
      # 18.x/20.x); major bumps overshoot it and break compilation.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # @types/vscode must match engines.vscode (the minimum VS Code, pinned by
      # vscode-languageclient). Minor/major bumps exceed it and vsce refuses to
      # package ("@types/vscode > engines.vscode"). Allow patch only.
      - dependency-name: "@types/vscode"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
