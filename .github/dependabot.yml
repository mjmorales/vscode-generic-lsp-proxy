version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # @types/node must track the minimum supported Node runtime (CI targets
      # 18.x/20.x); major bumps overshoot it and break compilation.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
